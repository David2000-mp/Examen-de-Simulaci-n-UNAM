name: CI

on:
  push:
    branches:
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Notify failure
        if: failure()
        run: echo "CI failed. Review lint/build logs before deploying."
